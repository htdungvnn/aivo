[package]
name = "aivo-compute"
version = "0.1.0"
edition = "2021"
description = "High-performance fitness calculations for AIVO platform (WASM)"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1.0.149"
itertools = "0.10"
chrono = { version = "0.4", features = ["serde"] }
image = { version = "0.24", default-features = false, features = ["jpeg", "png", "webp"] }
base64 = "0.21"
regex = "1.10"

# DSP and signal processing for acoustic myography
rustfft = "6.2"
numeric-array = "0.5"

[dev-dependencies]
wasm-bindgen-test = "0.3"
rand = "0.8"

[profile.release]
lto = true
opt-level = "z"
codegen-units = 1
panic = "abort"
