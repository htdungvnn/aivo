[package]
name = "infographic-generator"
version = "0.1.0"
edition = "2021"
description = "SVG/PNG infographic generator for fitness social proof"
license = "MIT"
repository = "https://github.com/htdungvnn/aivo"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde-wasm-bindgen = "0.6"
svg = "0.14"
resvg = "0.41"
tiny-skia = "0.11"
usvg = "0.41"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
base64 = "0.22"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
