# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/platform/configuration/

name = "aivo-web"
compatibility_date = "2025-04-20"
compatibility_flags = ["nodejs_compat"]

# Build configuration
[build]
command = "pnpm run build:pages"
output_directory = ".next/standalone"

# Environment variables for build
[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"

# Routes configuration
# Pages will automatically use the _routes file, but we can add additional rules here

# Redirects (301 = permanent, 302 = temporary)
# [[redirects]]
# from = "/old-path"
# to = "/new-path"
# status = 301
# force = false

# Headers for security
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.aivo.yourdomain.com https://*.r2.dev; font-src 'self'; object-src 'none'; frame-ancestors 'none';"

# Static assets caching
[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_next/image/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
