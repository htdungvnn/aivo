# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/platform/configuration/

name = "aivo-web"
compatibility_date = "2025-04-20"
compatibility_flags = ["nodejs_compat"]

# Build configuration
[build]
command = "pnpm run build:pages"
output_directory = "out"

# Environment variables for build
[build.environment]
NODE_VERSION = "20"
NEXT_TELEMETRY_DISABLED = "1"
NEXT_PUBLIC_API_URL = "https://api.aivo.website"

# Routes configuration
# Pages will automatically use the _routes file, but we can add additional rules here

# Static assets caching
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/_next/image/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
