name = "aivo-api"
main = "src/index.ts"
compatibility_date = "2025-04-20"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "aivo-db"
database_id = "aivo-db"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images"

[[kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "aivo-body-cache"
preview_id = "aivo-body-cache-preview"

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "aivo-leaderboard"
preview_id = "aivo-leaderboard-preview"

[triggers]
crons = ["0 0 * * *", "0 9 1 * *"]  # Daily at midnight + monthly on 1st

[vars]
AUTH_SECRET = "change-this-in-production"

[[routes]]
pattern = "/api/*"
zone_name = "aivo"
