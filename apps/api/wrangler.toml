name = "aivo-api"
main = "src/index.ts"
compatibility_date = "2025-04-24"
compatibility_flags = ["nodejs_compat"]

[alias]
"@aivo/email-reporter" = "../../packages/email-reporter/src"

[[d1_databases]]
binding = "DB"
database_name = "aivo-db"
database_id = "c262737b-ab5f-4973-841a-7c75ef0dcb20" # Đảm bảo ID này chính xác

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images"

[[kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "f453355bae1a43bb944ce8d01cc40356"

[[kv_namespaces]]
binding = "BIOMETRIC_CACHE"
id = "0e2ea990aa4441fc84b2bd0a38496524"

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "c09a3fb62443492389f1675371e1c4d8"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "cecb209e86dc4b36b3661e6b8d595b74" # Sử dụng ID thực tế thay vì tên "aivo-rate-limit"

[triggers]
crons = ["0 0 * * *", "0 9 1 * *"]

[vars]
# Môi trường production
NODE_ENV = "production"
# Cho phép web gọi API và API tự gọi chính nó
ALLOWED_ORIGINS = "https://aivo.website,https://api.aivo.website,http://localhost:3000"
# URL public của R2
R2_PUBLIC_URL = "https://312b98fff6f54aa11ae59cb06d30015a.r2.cloudflarestorage.com/aivo-images"
# Cho phép truy cập Swagger docs công khai (chỉ dùng trong production nếu cần)
PUBLIC_SWAGGER = "false"

[[routes]]
# Custom domain route - pattern should be just the hostname (no path/wildcard)
pattern = "api.aivo.website"
custom_domain = true
zone_name = "aivo.website"

