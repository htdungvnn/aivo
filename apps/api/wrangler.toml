name = "aivo-api"
main = "src/index.ts"
compatibility_date = "2025-04-20"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "aivo-db"
database_id = "aivo-db"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images"

[[kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "f453355bae1a43bb944ce8d01cc40356"

[[kv_namespaces]]
binding = "BIOMETRIC_CACHE"
id = "0e2ea990aa4441fc84b2bd0a38496524"

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "c09a3fb62443492389f1675371e1c4d8"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "aivo-rate-limit"
preview_id = "aivo-rate-limit-preview"

[triggers]
crons = ["0 0 * * *", "0 9 1 * *"]  # Daily at midnight + monthly on 1st

[vars]
# Secrets should be set via: wrangler secret put <NAME>
# Required secrets:
# - AUTH_SECRET: Generate with: openssl rand -base64 32
# - OPENAI_API_KEY: Your OpenAI API key
# - GOOGLE_CLIENT_ID: Google OAuth client ID
# - FACEBOOK_APP_ID: Facebook app ID
R2_PUBLIC_URL = "https://312b98fff6f54aa11ae59cb06d30015a.r2.cloudflarestorage.com/aivo-images"  # Set to your R2 public URL in production

[[routes]]
pattern = "/api/*"
zone_name = "aivo"
