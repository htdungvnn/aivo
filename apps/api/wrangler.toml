name = "aivo-api"
main = "src/index.ts"
compatibility_date = "2025-04-20"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "aivo-db"
database_id = "aivo-db"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images"

[[kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "aivo-body-cache"
preview_id = "aivo-body-cache-preview"

[vars]
AUTH_SECRET = "change-this-in-production"

[build]
command = "pnpm run build"

[[routes]]
pattern = "/api/*"
zone_name = "aivo"
