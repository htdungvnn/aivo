name = "aivo-api"
main = "src/index.ts"
compatibility_date = "2025-04-24"
compatibility_flags = ["nodejs_compat"]

# Resource limits for production safety
# These prevent runaway requests from consuming excessive resources
# Note: cpu_ms is only available on paid Cloudflare Workers plans
[limits]
memory_mb = 256

[alias]
"@aivo/db" = "../../packages/db/dist"
"@aivo/db/schema" = "../../packages/db/dist/schema.js"
"@aivo/compute" = "../../packages/compute/pkg"
"@aivo/memory-service" = "../../packages/memory-service/dist"
"@aivo/shared-types" = "../../packages/shared-types/dist"
"@aivo/excel-export" = "../../packages/excel-export/dist"
"@aivo/body-compute" = "../../packages/body-compute/src"
"@aivo/email-reporter" = "../../packages/email-reporter/src"

[[d1_databases]]
binding = "DB"
database_name = "aivo-db"
database_id = "c262737b-ab5f-4973-841a-7c75ef0dcb20"
migrations_dir = "../../packages/db/drizzle/migrations"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images"

[[kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "f453355bae1a43bb944ce8d01cc40356"

[[kv_namespaces]]
binding = "BIOMETRIC_CACHE"
id = "0e2ea990aa4441fc84b2bd0a38496524"

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "c09a3fb62443492389f1675371e1c4d8"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "cecb209e86dc4b36b3661e6b8d595b74"

[triggers]
crons = ["0 0 * * *", "0 9 1 * *"]

[vars]
NODE_ENV = "production"
ALLOWED_ORIGINS = "https://aivo.website,https://api.aivo.website,http://localhost:3000"
R2_PUBLIC_URL = "https://312b98fff6f54aa11ae59cb06d30015a.r2.cloudflarestorage.com/aivo-images"
PUBLIC_SWAGGER = "false"

[[routes]]
pattern = "api.aivo.website"
custom_domain = true
zone_name = "aivo.website"

# Staging environment configuration
# Deploy with: wrangler deploy --env staging
[env.staging]
name = "aivo-api-staging"

[env.staging.vars]
NODE_ENV = "staging"
ALLOWED_ORIGINS = "https://staging-aivo.website,http://localhost:3000"
R2_PUBLIC_URL = "https://staging-bucket.r2.cloudflarestorage.com/aivo-images"
PUBLIC_SWAGGER = "true"  # Enable Swagger in staging for testing

[[env.staging.d1_databases]]
binding = "DB"
database_name = "aivo-db-staging"
database_id = "REPLACE_WITH_STAGING_DB_ID"
migrations_dir = "../../packages/db/drizzle/migrations"

[[env.staging.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "aivo-images-staging"

[[env.staging.kv_namespaces]]
binding = "BODY_INSIGHTS_CACHE"
id = "REPLACE_WITH_STAGING_KV_ID"

[[env.staging.kv_namespaces]]
binding = "BIOMETRIC_CACHE"
id = "REPLACE_WITH_STAGING_KV_ID_2"

[[env.staging.kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "REPLACE_WITH_STAGING_KV_ID_3"

[[env.staging.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_STAGING_KV_ID_4"

[env.staging.triggers]
crons = ["0 0 * * *", "0 9 1 * *"]

