name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_HOME: /home/runner/.pnpm
  CARGO_HOME: /home/runner/.cargo
  RUSTUP_HOME: /home/runner/.rustup

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    environment:
      name: production
      url: https://aivo.your-domain.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rust-src
          default: true

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/turbo.json', '**/package.json') }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package.json', 'apps/web/tsconfig.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build


      - name: Copy WASM files to assets
        run: pnpm --filter @aivo/api run copy-wasm

      - name: Verify build
        run: |
          # Check WASM package directories exist
          test -d packages/compute/pkg
          # Check key WASM files exist
          test -f packages/compute/pkg/aivo_compute.js
          test -f packages/compute/pkg/aivo_compute_bg.wasm
          test -f packages/compute/pkg/aivo_compute.d.ts
          echo "All build artifacts verified"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "apps/api"
          command: "deploy --minify"

      - name: Install Wrangler globally
        run: npm install -g wrangler@latest

      - name: Apply Database Migrations
        working-directory: apps/api
        run: wrangler d1 migrations apply aivo-db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run Smoke Tests
        run: |
          if [ -z "$API_URL" ]; then
            echo "Error: PRODUCTION_API_URL secret is not set. Skipping smoke tests."
            exit 1
          fi
          bash scripts/smoke-tests.sh
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Send Deployment Notification
        if: always()
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL not set, skipping notification."
            exit 0
          fi
          STATUS="${{ job.status }}"
          COMMIT="${{ github.sha }}"
          REF="${{ github.ref_name }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg status "$STATUS" \
            --arg commit "$COMMIT" \
            --arg ref "$REF" \
            --arg url "$RUN_URL" \
            '{text: "Deployment \($status). Commit: \($commit), Ref: \($ref). Details: \($url)"}')
          curl -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$DEPLOY_WEBHOOK_URL"
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
