name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PNPM_HOME: ~/.pnpm
  CARGO_HOME: ~/.cargo
  RUSTUP_HOME: ~/.rustup

jobs:
  build-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    environment:
      name: production
      url: https://aivo.your-domain.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0
          run_install: false

      - name: Prepare Rust directories
        run: |
          # Clean up any potentially corrupted wasm32 target from previous runs
          rm -rf /home/runner/.rustup/toolchains/*/lib/rustlib/wasm32-unknown-unknown 2>/dev/null || true
          rm -rf /home/runner/.rustup/downloads/* 2>/dev/null || true
          rm -rf /home/runner/.cargo/registry/* 2>/dev/null || true

          # Prepare directories
          mkdir -p /home/runner/.rustup/downloads
          mkdir -p /home/runner/.cargo/registry/index
          mkdir -p /home/runner/.cargo/registry/cache
          mkdir -p /home/runner/.cargo/git
          mkdir -p /home/runner/.cargo/bin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Ensure wasm32 target is installed
        run: |
          set -e
          echo "Installing wasm32-unknown-unknown target with retry logic..."
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts..."
            if rustup target add wasm32-unknown-unknown; then
              echo "Successfully installed wasm32-unknown-unknown target"
              break
            fi
            echo "Attempt $attempt failed, cleaning up and retrying..."
            # Clean up any partial downloads
            rm -rf /home/runner/.rustup/tmp
            rm -rf /home/runner/.rustup/dist
            sleep 5
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "Failed to install wasm32-unknown-unknown target after $max_attempts attempts"
            exit 1
          fi

          rustup target list | grep wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/turbo.json', '**/package.json') }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package.json', 'apps/web/tsconfig.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Verify build
        run: |
          # Check API dist exists
          if [ ! -d "apps/api/dist" ]; then
            echo "Error: API dist not found"
            exit 1
          fi
          # Check WASM files exist
          test -f packages/aivo-compute/pkg/aivo_compute.js
          test -f packages/aivo-compute/pkg/aivo_compute_bg.wasm
          test -f packages/aivo-compute/pkg/aivo_compute.d.ts
          echo "All build artifacts verified"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "apps/api"
          command: "deploy --minify"
