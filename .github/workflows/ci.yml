name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

# Set up environment variables for caching
env:
  PNPM_HOME: ~/.pnpm
  CARGO_HOME: ~/.cargo
  RUSTUP_HOME: ~/.rustup

jobs:
  type-check-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for turbo cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Add wasm32 target explicitly (clean install)
        run: |
          # Ensure rustup directory structure exists
          mkdir -p ~/.rustup/downloads
          chmod -R u+rwX ~/.rustup 2>/dev/null || true

          # Clean up any existing wasm32 target to avoid corruption
          rustup target remove wasm32-unknown-unknown 2>/dev/null || true
          rm -rf "$CARGO_HOME/registry"/* 2>/dev/null || true

          # Force install to ensure clean state
          rustup target add wasm32-unknown-unknown --force

          # Verify
          rustup target list | grep wasm32-unknown-unknown

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check all packages
        run: pnpm run type-check

      - name: Lint all packages
        run: pnpm run lint

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [type-check-lint]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show
          rustup target list | grep wasm32-unknown-unknown || echo "Target not listed"

      - name: Add wasm32 target explicitly (with force to handle partial installs)
        run: |
          # Ensure rustup directory structure exists
          mkdir -p ~/.rustup/downloads
          chmod -R u+rwX ~/.rustup 2>/dev/null || true

          # Remove any existing wasm32 target to avoid corruption
          rustup target remove wasm32-unknown-unknown 2>/dev/null || true

          # Force install to ensure clean state
          rustup target add wasm32-unknown-unknown --force

          # Verify
          rustup target list | grep wasm32-unknown-unknown

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/turbo.json', '**/package.json') }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package.json', 'apps/web/tsconfig.json') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM
        run: pnpm run build:wasm

      - name: Build all packages
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next/
            apps/api/dist/
            packages/aivo-compute/pkg/
            packages/aivo-optimizer/pkg/
            packages/infographic-generator/pkg/
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [type-check-lint]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show
          rustup target list | grep wasm32-unknown-unknown || echo "Target not listed"

      - name: Add wasm32 target explicitly (with force to handle partial installs)
        run: |
          # Ensure rustup directory structure exists
          mkdir -p ~/.rustup/downloads
          chmod -R u+rwX ~/.rustup 2>/dev/null || true

          # Remove any existing wasm32 target to avoid corruption
          rustup target remove wasm32-unknown-unknown 2>/dev/null || true

          # Force install to ensure clean state
          rustup target add wasm32-unknown-unknown --force

          # Verify
          rustup target list | grep wasm32-unknown-unknown

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry
            ${{ env.CARGO_HOME }}/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm run test
        env:
          CI: true
