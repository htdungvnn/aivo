name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

# Set up environment variables for caching
env:
  PNPM_HOME: ~/.pnpm
  CARGO_HOME: ~/.cargo
  RUSTUP_HOME: ~/.rustup
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  type-check-lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for turbo cache

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Prepare Rust environment
        run: |
          # Clean up any potentially corrupted wasm32 target from previous runs
          rm -rf /home/runner/.rustup/toolchains/*/lib/rustlib/wasm32-unknown-unknown 2>/dev/null || true
          rm -rf /home/runner/.rustup/downloads/* 2>/dev/null || true
          rm -rf /home/runner/.cargo/registry/* 2>/dev/null || true

          # Create fresh directories with proper permissions
          mkdir -p /home/runner/.rustup/downloads
          mkdir -p /home/runner/.cargo/registry/index
          mkdir -p /home/runner/.cargo/registry/cache
          mkdir -p /home/runner/.cargo/git
          mkdir -p /home/runner/.cargo/bin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Ensure wasm32 target is installed
        run: |
          set -e
          echo "Installing wasm32-unknown-unknown target with retry logic..."
          # Ensure rustup directories exist
          mkdir -p /home/runner/.rustup/downloads
          mkdir -p /home/runner/.rustup/toolchains
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts..."
            if rustup target add wasm32-unknown-unknown; then
              echo "Successfully installed wasm32-unknown-unknown target"
              break
            fi
            echo "Attempt $attempt failed, cleaning up and retrying..."
            # Clean up any partial downloads
            rm -rf /home/runner/.rustup/tmp
            rm -rf /home/runner/.rustup/dist
            rm -rf /home/runner/.rustup/downloads/*
            sleep 5
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "Failed to install wasm32-unknown-unknown target after $max_attempts attempts"
            exit 1
          fi

          rustup target list | grep wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check all packages
        run: pnpm run type-check

      - name: Lint all packages
        run: pnpm run lint

  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [type-check-lint]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm via corepack
        run: corepack enable && corepack prepare pnpm@10.33.0 --activate

      - name: Prepare Rust environment
        run: |
          # Clean up any potentially corrupted wasm32 target from previous runs
          rm -rf /home/runner/.rustup/toolchains/*/lib/rustlib/wasm32-unknown-unknown 2>/dev/null || true
          rm -rf /home/runner/.rustup/downloads/* 2>/dev/null || true
          rm -rf /home/runner/.cargo/registry/* 2>/dev/null || true

          # Create fresh directories with proper permissions
          mkdir -p /home/runner/.rustup/downloads
          mkdir -p /home/runner/.cargo/registry/index
          mkdir -p /home/runner/.cargo/registry/cache
          mkdir -p /home/runner/.cargo/git
          mkdir -p /home/runner/.cargo/bin

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Ensure wasm32 target is installed
        run: |
          set -e
          echo "Installing wasm32-unknown-unknown target with retry logic..."
          # Ensure rustup directories exist
          mkdir -p /home/runner/.rustup/downloads
          mkdir -p /home/runner/.rustup/toolchains
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts..."
            if rustup target add wasm32-unknown-unknown; then
              echo "Successfully installed wasm32-unknown-unknown target"
              break
            fi
            echo "Attempt $attempt failed, cleaning up and retrying..."
            # Clean up any partial downloads
            rm -rf /home/runner/.rustup/tmp
            rm -rf /home/runner/.rustup/dist
            rm -rf /home/runner/.rustup/downloads/*
            sleep 5
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "Failed to install wasm32-unknown-unknown target after $max_attempts attempts"
            exit 1
          fi

          rustup target list | grep wasm32-unknown-unknown

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Set Rust default toolchain
        run: rustup default stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh -s -- -f

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PNPM_HOME }}/store
            ~/.local/share/pnpm/store
            node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/turbo.json', '**/package.json') }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package.json', 'apps/web/tsconfig.json') }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build WASM
        run: pnpm run build:wasm

      - name: Build all packages
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next/
            apps/api/dist/
            packages/aivo-compute/pkg/
            packages/aivo-optimizer/pkg/
            packages/infographic-generator/pkg/
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [type-check-lint]
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - name: Checkout
